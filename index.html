<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPL 2026 — Prediction League</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060910;
  --card: #111827;
  --card2: #1a2236;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.12);
  --gold: #f0c040;
  --gold2: #e8922a;
  --red: #e8315b;
  --green: #34d399;
  --blue: #60a5fa;
  --text: #eef2ff;
  --muted: #64748b;
  --muted2: #94a3b8;
  --r: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Barlow', sans-serif;
  min-height: 100vh; overflow-x: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 100% 55% at 50% -5%, rgba(240,192,64,0.08) 0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 90% 85%, rgba(96,165,250,0.05) 0%, transparent 50%),
    radial-gradient(ellipse 40% 30% at 5% 95%, rgba(232,49,91,0.05) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: repeating-linear-gradient(0deg,transparent,transparent 80px,rgba(255,255,255,0.013) 80px,rgba(255,255,255,0.013) 81px);
  pointer-events: none; z-index: 0;
}
.page { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 0 18px 80px; }

/* HERO */
.hero { padding: 52px 0 36px; }
.hero-eyebrow { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
.hero-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--gold); box-shadow: 0 0 8px rgba(240,192,64,0.6);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.7)} }
.hero-live {
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px; font-weight:700; letter-spacing:.14em;
  text-transform:uppercase; color:var(--gold);
}
.hero h1 {
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(64px,12vw,110px);
  line-height:.88; letter-spacing:.02em; color:var(--text);
}
.hero h1 em { color:var(--gold); font-style:normal; }
.hero-desc { margin-top:18px; font-size:15px; color:var(--muted2); max-width:480px; line-height:1.65; }
.hero-actions { display:flex; align-items:center; gap:12px; margin-top:22px; flex-wrap:wrap; }
.btn-refresh {
  display:inline-flex; align-items:center; gap:7px;
  background:rgba(240,192,64,0.12); border:1px solid rgba(240,192,64,0.35);
  color:var(--gold); border-radius:10px; padding:10px 20px;
  font-size:13px; font-weight:600; font-family:'Barlow',sans-serif;
  cursor:pointer; transition:background .2s,transform .1s; letter-spacing:.02em;
}
.btn-refresh:hover { background:rgba(240,192,64,0.22); }
.btn-refresh:active { transform:scale(.97); }
.btn-refresh svg { width:14px; height:14px; }
.btn-share {
  display:inline-flex; align-items:center; gap:7px;
  background:rgba(96,165,250,0.10); border:1px solid rgba(96,165,250,0.28);
  color:var(--blue); border-radius:10px; padding:10px 20px;
  font-size:13px; font-weight:600; font-family:'Barlow',sans-serif;
  cursor:pointer; transition:background .2s,transform .1s; letter-spacing:.02em;
}
.btn-share:hover { background:rgba(96,165,250,0.20); }
.btn-share:active { transform:scale(.97); }
.btn-share svg { width:14px; height:14px; }
#status { font-size:13px; color:var(--muted); }

/* AUTO REFRESH TIMER */
.refresh-timer {
  display:inline-flex; align-items:center; gap:6px;
  font-size:12px; color:var(--muted);
  background:rgba(255,255,255,0.04); border:1px solid var(--border);
  border-radius:8px; padding:6px 12px;
}
.timer-dot { width:6px; height:6px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; }

/* LAST MATCH BANNER */
.last-match-banner {
  background: linear-gradient(135deg, rgba(240,192,64,0.1), rgba(232,146,42,0.07));
  border: 1px solid rgba(240,192,64,0.2);
  border-radius: var(--r); padding: 14px 18px;
  margin-bottom: 20px;
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  opacity:0; transform:translateY(8px);
  transition: opacity .4s, transform .4s;
}
.last-match-banner.show { opacity:1; transform:none; }
.lmb-label {
  font-size:10px; font-weight:700; letter-spacing:.12em;
  text-transform:uppercase; color:var(--gold); flex-shrink:0;
}
.lmb-match {
  font-family:'Barlow Condensed',sans-serif;
  font-size:17px; font-weight:700; color:var(--text);
}
.lmb-divider { color:var(--border2); }
.lmb-correct { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.lmb-correct-label { font-size:12px; color:var(--muted2); }
.correct-pill {
  background:rgba(52,211,153,0.15); border:1px solid rgba(52,211,153,0.3);
  color:var(--green); font-size:12px; font-weight:600;
  padding:2px 10px; border-radius:100px;
}
.no-correct { font-size:12px; color:var(--muted); font-style:italic; }

/* METRICS */
.metrics-grid {
  display:grid; grid-template-columns:repeat(4,1fr);
  gap:10px; margin-bottom:20px;
}
@media(max-width:600px){ .metrics-grid { grid-template-columns:repeat(2,1fr); } }
.metric-tile {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--r); padding:18px 16px 14px;
  position:relative; overflow:hidden;
  opacity:0; transform:translateY(14px);
  transition:opacity .4s ease,transform .4s ease;
}
.metric-tile::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg,var(--gold2),var(--gold)); opacity:0; transition:opacity .3s;
}
.metric-tile:hover::before { opacity:1; }
.metric-tile.show { opacity:1; transform:none; }
.mt-label { font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
.mt-val { font-family:'Bebas Neue',sans-serif; font-size:34px; color:var(--text); line-height:1; }
.mt-val.gold { color:var(--gold); }

/* TABS */
.tabs {
  display:flex; gap:2px; margin-bottom:22px;
  background:var(--card); border:1px solid var(--border);
  border-radius:12px; padding:4px; width:fit-content;
}
.tab-btn {
  background:transparent; border:none; border-radius:9px;
  padding:8px 22px; font-size:13px; font-weight:600;
  font-family:'Barlow',sans-serif; color:var(--muted2);
  cursor:pointer; transition:background .2s,color .2s; letter-spacing:.02em;
}
.tab-btn.active { background:linear-gradient(135deg,var(--gold2),var(--gold)); color:#1a0f00; }
.tab-panel { display:none; }
.tab-panel.active { display:block; }

/* LEADERBOARD */
.lb-list { display:flex; flex-direction:column; gap:8px; }
.lb-row {
  background:var(--card); border:1px solid var(--border);
  border-radius:12px; padding:14px 18px;
  display:flex; align-items:center; gap:12px;
  opacity:0; transform:translateX(-12px);
  transition:opacity .35s,transform .35s,border-color .2s;
  position:relative; overflow:hidden;
}
.lb-row.top1 { border-color:rgba(240,192,64,0.25); }
.lb-row.top1::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(90deg,rgba(240,192,64,0.05),transparent 60%);
  pointer-events:none;
}
.lb-row.show { opacity:1; transform:none; }
.lb-row:hover { border-color:var(--border2); }
.lb-num {
  font-family:'Bebas Neue',sans-serif; font-size:26px;
  width:32px; text-align:center; color:var(--muted); flex-shrink:0;
}
.lb-num.r1 { color:var(--gold); }
.lb-num.r2 { color:#94a3b8; }
.lb-num.r3 { color:#cd7c54; }
.lb-avatar {
  width:38px; height:38px; border-radius:50%;
  background:var(--card2); border:1px solid var(--border2);
  display:flex; align-items:center; justify-content:center;
  font-family:'Barlow Condensed',sans-serif;
  font-size:14px; font-weight:700; color:var(--muted2); flex-shrink:0;
}
.lb-avatar.a0 { background:rgba(240,192,64,0.15); border-color:rgba(240,192,64,0.3); color:var(--gold); }
.lb-info { flex:1; min-width:0; }
.lb-name-row { display:flex; align-items:center; gap:8px; margin-bottom:4px; flex-wrap:wrap; }
.lb-name { font-size:15px; font-weight:600; color:var(--text); }
.leader-pill {
  background:linear-gradient(90deg,var(--gold2),var(--gold));
  color:#1a0f00; font-size:9px; font-weight:700;
  letter-spacing:.1em; text-transform:uppercase;
  padding:2px 8px; border-radius:100px;
}
/* Streak badge */
.streak-badge {
  font-size:11px; font-weight:700; padding:2px 8px;
  border-radius:100px; letter-spacing:.04em;
}
.streak-hot { background:rgba(232,49,91,0.18); border:1px solid rgba(232,49,91,0.35); color:#f87171; }
.streak-cold { background:rgba(96,165,250,0.12); border:1px solid rgba(96,165,250,0.25); color:var(--blue); }
/* Rank change */
.rank-change { font-size:11px; font-weight:700; display:flex; align-items:center; gap:2px; }
.rank-up { color:var(--green); }
.rank-down { color:var(--red); }
.rank-same { color:var(--muted); font-size:10px; }
.lb-sub { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.lb-medals { font-size:12px; color:var(--muted); }
.lb-accuracy {
  font-size:11px; font-weight:600;
  background:rgba(96,165,250,0.1); border:1px solid rgba(96,165,250,0.2);
  color:var(--blue); padding:1px 8px; border-radius:100px;
}
.lb-total-correct {
  font-size:11px; color:var(--muted2);
}
.lb-bar-col { flex:1; max-width:140px; }
.lb-bar-bg { height:4px; background:rgba(255,255,255,0.07); border-radius:2px; overflow:hidden; }
.lb-bar-fill { height:100%; border-radius:2px; background:linear-gradient(90deg,var(--gold2),var(--gold)); }
.lb-score {
  text-align:right; flex-shrink:0;
  font-family:'Bebas Neue',sans-serif;
  font-size:32px; color:var(--text); line-height:1; min-width:48px;
}
.lb-score-label { font-size:10px; color:var(--muted); text-align:right; letter-spacing:.06em; text-transform:uppercase; }

/* MATCHES */
.matches-grid { display:flex; flex-direction:column; gap:12px; }
.match-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--r); overflow:hidden;
  opacity:0; transform:translateY(8px);
  transition:opacity .35s,transform .35s;
}
.match-card.show { opacity:1; transform:none; }
.match-card.current-match { border-color:rgba(52,211,153,0.3); }
.match-card.current-match .match-header {
  background:linear-gradient(90deg,rgba(52,211,153,0.08),transparent);
}
.match-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 18px 12px;
  border-bottom:1px solid var(--border);
  background:linear-gradient(90deg,rgba(240,192,64,0.07),transparent);
}
.match-header-left { display:flex; align-items:center; gap:10px; }
.match-name {
  font-family:'Barlow Condensed',sans-serif;
  font-size:18px; font-weight:700; letter-spacing:.05em;
  text-transform:uppercase; color:var(--text);
}
.match-vs { color:var(--gold); margin:0 5px; }
.match-num { font-size:11px; font-weight:600; color:var(--muted); letter-spacing:.06em; }
.match-status-pill {
  font-size:10px; font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; padding:3px 10px; border-radius:100px;
}
.pill-live { background:rgba(52,211,153,0.15); border:1px solid rgba(52,211,153,0.35); color:var(--green); }
.pill-done { background:rgba(255,255,255,0.06); border:1px solid var(--border2); color:var(--muted2); }
.pill-upcoming { background:rgba(96,165,250,0.1); border:1px solid rgba(96,165,250,0.25); color:var(--blue); }
.picks-row { display:flex; }
.pick-chip {
  display:flex; flex-direction:column;
  padding:13px 18px; border-right:1px solid var(--border);
  flex:1; transition:background .2s; cursor:default;
}
.pick-chip:last-child { border-right:none; }
.pick-chip:hover { background:rgba(255,255,255,0.025); }
.pick-rank {
  font-size:9px; font-weight:700;
  letter-spacing:.12em; text-transform:uppercase; margin-bottom:5px;
}
.pick-rank.r1 { color:var(--gold); }
.pick-rank.r2 { color:#94a3b8; }
.pick-rank.r3 { color:#cd7c54; }
.pick-name {
  font-family:'Barlow Condensed',sans-serif;
  font-size:19px; font-weight:700; color:var(--text); letter-spacing:.02em;
}
.pick-name.empty { color:var(--muted); font-size:15px; font-weight:400; font-family:'Barlow',sans-serif; }

/* CHART */
.chart-section { display:flex; flex-direction:column; gap:12px; }
.chart-row-wrap { display:flex; align-items:center; gap:14px; }
.chart-label { width:76px; text-align:right; font-size:13px; font-weight:600; color:var(--muted2); flex-shrink:0; }
.chart-track { flex:1; background:rgba(255,255,255,0.05); border-radius:8px; height:36px; overflow:hidden; position:relative; }
.chart-fill {
  height:100%; border-radius:8px;
  background:linear-gradient(90deg,var(--gold2) 0%,var(--gold) 100%);
  display:flex; align-items:center; justify-content:flex-end;
  padding-right:12px; min-width:36px;
  transition:width .7s cubic-bezier(.16,1,.3,1);
}
.chart-fill-val { font-size:13px; font-weight:700; color:#1a0f00; }
.chart-zero { font-size:13px; color:var(--muted); padding-left:10px; line-height:36px; }

/* TOAST */
.toast {
  position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(80px);
  background:var(--card2); border:1px solid var(--border2);
  color:var(--text); font-size:13px; font-weight:600;
  padding:12px 22px; border-radius:12px;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
  transition:transform .35s cubic-bezier(.16,1,.3,1), opacity .35s;
  opacity:0; z-index:999; white-space:nowrap;
}
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

/* FOOTER */
.footer { margin-top:60px; padding-top:20px; border-top:1px solid var(--border); text-align:center; font-size:12px; color:var(--muted); }

#main-content { display:none; }
@media(max-width:600px){
  .lb-bar-col { display:none; }
  .pick-chip { padding:10px 12px; }
  .pick-name { font-size:16px; }
}
</style>
</head>
<body>
<div class="page">

  <div class="hero">
    <div class="hero-eyebrow">
      <div class="hero-dot"></div>
      <span class="hero-live">Live Standings</span>
    </div>
    <h1>IPL<br><em>Prediction</em><br>League</h1>
    <p class="hero-desc">Your group's IPL 2026 match predictions — live from the sheet.</p>
    <div class="hero-actions">
      <button class="btn-refresh" onclick="manualRefresh()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        Refresh
      </button>
      <button class="btn-share" onclick="shareSnapshot()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        Share
      </button>
      <span id="status"></span>
    </div>
    <div style="margin-top:12px;">
      <div class="refresh-timer" id="refresh-timer">
        <div class="timer-dot"></div>
        <span id="timer-label">Auto-refresh in 5:00</span>
      </div>
    </div>
  </div>

  <div id="main-content">
    <!-- Last Match Banner -->
    <div class="last-match-banner" id="last-match-banner"></div>

    <div class="metrics-grid" id="metrics-grid"></div>
    <div class="tabs">
      <button class="tab-btn active" onclick="setTab('leaderboard',this)">Leaderboard</button>
      <button class="tab-btn" onclick="setTab('matches',this)">Matches</button>
      <button class="tab-btn" onclick="setTab('chart',this)">Chart</button>
    </div>
    <div class="tab-panel active" id="tab-leaderboard">
      <div class="lb-list" id="lb-list"></div>
    </div>
    <div class="tab-panel" id="tab-matches">
      <div class="matches-grid" id="matches-grid"></div>
    </div>
    <div class="tab-panel" id="tab-chart">
      <div class="chart-section" id="chart-wrap"></div>
    </div>
  </div>

  <div class="footer">IPL 2026 Prediction League &mdash; Season 19</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const DEMO = {
  matches:[
    {match:'RCB vs SRH',picks:['Ramesh','Sanju','Void']},
    {match:'MI vs KKR', picks:['Void','Deva','Raghu']},
    {match:'RR vs CSK', picks:['Paltans','Ramesh','Vivek']}
  ],
  winners:[
    {name:'Deva',pts:.5},{name:'Kirubha',pts:0},{name:'Ramesh',pts:1.5},
    {name:'Paltans',pts:1},{name:'Sanju',pts:.5},{name:'Vivek',pts:.25},
    {name:'Void',pts:1},{name:'Raghu',pts:.25}
  ],
  firstPlace:[
    {name:'Deva',count:0},{name:'Kirubha',count:0},{name:'Ramesh',count:1},
    {name:'Paltans',count:1},{name:'Sanju',count:0},{name:'Vivek',count:0},
    {name:'Void',count:1},{name:'Raghu',count:0}
  ],
  secondPlace:[
    {name:'Deva',count:1},{name:'Kirubha',count:0},{name:'Ramesh',count:1},
    {name:'Paltans',count:0},{name:'Sanju',count:1},{name:'Void',count:0}
  ],
  thirdPlace:[
    {name:'Vivek',count:1},{name:'Raghu',count:1},{name:'Void',count:1}
  ]
};

const SHEET_ID = '1GOfJvFP0FniAqIQcyiqpexaQoJbGo3DVZKxTXcpftcE';
const AUTO_REFRESH_SECS = 300; // 5 minutes

let prevRanks = {}; // store previous rank positions for rank-change arrows
let timerInterval = null;
let timerSecs = AUTO_REFRESH_SECS;

/* ── TIMER ── */
function startTimer() {
  clearInterval(timerInterval);
  timerSecs = AUTO_REFRESH_SECS;
  updateTimerLabel();
  timerInterval = setInterval(() => {
    timerSecs--;
    updateTimerLabel();
    if (timerSecs <= 0) {
      autoLoad();
      timerSecs = AUTO_REFRESH_SECS;
    }
  }, 1000);
}

function updateTimerLabel() {
  const m = Math.floor(timerSecs / 60);
  const s = timerSecs % 60;
  document.getElementById('timer-label').textContent =
    `Auto-refresh in ${m}:${String(s).padStart(2,'0')}`;
}

/* ── TOAST ── */
function showToast(msg, duration=2400) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

/* ── SHARE ── */
function shareSnapshot() {
  const lb = document.getElementById('lb-list');
  if (!lb || !lb.children.length) { showToast('No data to share yet!'); return; }

  const rows = [...lb.querySelectorAll('.lb-row')];
  let text = '🏏 IPL 2026 Prediction League — Standings\n\n';
  rows.forEach((row, i) => {
    const name = row.querySelector('.lb-name')?.textContent || '';
    const pts  = row.querySelector('.lb-score')?.textContent || '';
    const medals = row.querySelector('.lb-medals')?.textContent || '';
    const sym = ['🥇','🥈','🥉'][i] || `${i+1}.`;
    text += `${sym} ${name} — ${pts} pts  ${medals}\n`;
  });
  text += '\n#IPL2026 #PredictionLeague';

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('📋 Standings copied to clipboard!'));
  } else {
    showToast('Could not copy — try manually.');
  }
}

function initials(name) {
  return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
}

function setStatus(msg, type='') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.color = type==='error'?'#f87171':type==='ok'?'#34d399':'#64748b';
}

function setTab(id, btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
}

function animate(els, cls, delay=60) {
  els.forEach((el,i)=>setTimeout(()=>el.classList.add(cls), i*delay));
}

/* ── STREAK CALCULATION ──
   Look at last N matches; for each match, check if a player's picks
   include the winning team. We approximate "correct" as: player name appears in picks.
   Since the sheet doesn't give us match results, we infer correctness from
   whether the player picked the same team as first-place picks in that match.
   Simplified: we compute streak from pick-order position in recent matches. */
function computeStreaks(matches, firstPlaceNames) {
  // For each player, check last 5 matches: did they appear as pick #1 (correct)?
  // We'll use: if they appear in the match picks list at all = they predicted
  // We approximate: streak = consecutive recent matches where player was 1st pick (won)
  const playerStreaks = {};
  const recentMatches = [...matches].slice(-5).reverse(); // last 5, newest first

  const allNames = new Set();
  matches.forEach(m => m.picks.forEach(p => { if(p && p !== '—') allNames.add(p); }));

  allNames.forEach(name => {
    let hot = 0, cold = 0;
    for (const m of recentMatches) {
      if (m.picks[0] === name) { if(cold > 0) break; hot++; }
      else { if(hot > 0) break; if(m.picks.some(p=>p===name)) cold++; else break; }
    }
    if (hot >= 2) playerStreaks[name] = { type:'hot', count:hot };
    else if (cold >= 2) playerStreaks[name] = { type:'cold', count:cold };
  });
  return playerStreaks;
}

/* ── ACCURACY ── totalCorrect / totalMatches */
function computeAccuracy(name, fpMap, spMap, tpMap, totalMatches) {
  const total = (fpMap[name]??0) + (spMap[name]??0) + (tpMap[name]??0);
  if (!totalMatches) return { pct: 0, total };
  return { pct: Math.round(total / totalMatches * 100), total };
}

function renderDashboard(data) {
  document.getElementById('main-content').style.display='block';

  // Build lookup maps
  const fpMap = Object.fromEntries((data.firstPlace||[]).map(x=>[x.name, x.count??x.pts??0]));
  const spMap = Object.fromEntries((data.secondPlace||[]).map(x=>[x.name, x.count??x.pts??0]));
  const tpMap = Object.fromEntries((data.thirdPlace||[]).map(x=>[x.name, x.count??x.pts??0]));

  // Sort with tiebreakers: pts → 1st place → 2nd place → 3rd place
  const sorted = [...data.winners].sort((a, b) => {
    if (b.pts !== a.pts) return b.pts - a.pts;
    const fp = (fpMap[b.name]??0) - (fpMap[a.name]??0);
    if (fp !== 0) return fp;
    const sp = (spMap[b.name]??0) - (spMap[a.name]??0);
    if (sp !== 0) return sp;
    return (tpMap[b.name]??0) - (tpMap[a.name]??0);
  });

  const leader   = sorted[0];
  const maxPts   = Math.max(...sorted.map(p=>p.pts), .01);
  const totalMatches = data.matches.length;

  // Compute rank changes
  const currentRanks = {};
  sorted.forEach((p,i) => currentRanks[p.name] = i+1);
  const rankChanges = {};
  sorted.forEach(p => {
    const prev = prevRanks[p.name];
    if (!prev) rankChanges[p.name] = 'new';
    else if (prev > currentRanks[p.name]) rankChanges[p.name] = 'up';
    else if (prev < currentRanks[p.name]) rankChanges[p.name] = 'down';
    else rankChanges[p.name] = 'same';
  });
  prevRanks = { ...currentRanks };

  // Streaks
  const streaks = computeStreaks(data.matches, fpMap);

  /* ── LAST MATCH BANNER ── */
  const lastMatch = data.matches[data.matches.length - 1];
  if (lastMatch) {
    const banner = document.getElementById('last-match-banner');
    const correctPickers = lastMatch.picks.filter(p => p && p !== '—');
    const parts = lastMatch.match.split(' vs ');

    banner.innerHTML = `
      <div class="lmb-label">⚡ Last Match</div>
      <div class="lmb-match">${parts[0]||lastMatch.match}<span style="color:var(--gold)"> vs </span>${parts[1]||''}</div>
      <div class="lmb-divider">·</div>
      <div class="lmb-correct">
        <span class="lmb-correct-label">Predicted by:</span>
        ${correctPickers.length
          ? correctPickers.map(p=>`<span class="correct-pill">${p}</span>`).join('')
          : '<span class="no-correct">No one</span>'}
      </div>
    `;
    setTimeout(() => banner.classList.add('show'), 100);
  }

  /* ── METRICS ── */
  const totalCorrectAll = sorted.reduce((acc, p) => {
    return acc + (fpMap[p.name]??0) + (spMap[p.name]??0) + (tpMap[p.name]??0);
  }, 0);
  const overallAccuracy = totalMatches > 0
    ? Math.round(totalCorrectAll / (totalMatches * sorted.length) * 100)
    : 0;

  const mg = document.getElementById('metrics-grid');
  mg.innerHTML = `
    <div class="metric-tile"><div class="mt-label">Leader</div><div class="mt-val gold" style="font-size:clamp(20px,4vw,30px);line-height:1.1;margin-top:4px;">${leader.name}</div></div>
    <div class="metric-tile"><div class="mt-label">Top Score</div><div class="mt-val">${leader.pts}</div></div>
    <div class="metric-tile"><div class="mt-label">Matches</div><div class="mt-val">${totalMatches}</div></div>
    <div class="metric-tile"><div class="mt-label">Players</div><div class="mt-val">${data.winners.length}</div></div>
  `;
  animate([...mg.querySelectorAll('.metric-tile')],'show',80);

  /* ── LEADERBOARD ── */
  const rankSym=['🥇','🥈','🥉'], rankCls=['r1','r2','r3'];

  document.getElementById('lb-list').innerHTML = sorted.map((p,i) => {
    const acc = computeAccuracy(p.name, fpMap, spMap, tpMap, totalMatches);
    const streak = streaks[p.name];
    const rc = rankChanges[p.name];
    const rcHtml = rc === 'up'   ? `<span class="rank-change rank-up">▲</span>`
                 : rc === 'down' ? `<span class="rank-change rank-down">▼</span>`
                 : rc === 'same' ? `<span class="rank-change rank-same">–</span>`
                 : '';
    const streakHtml = streak
      ? streak.type === 'hot'
        ? `<span class="streak-badge streak-hot">🔥 ${streak.count} streak</span>`
        : `<span class="streak-badge streak-cold">❄️ ${streak.count} cold</span>`
      : '';

    return `
    <div class="lb-row ${i===0?'top1':''}">
      <div style="display:flex;flex-direction:column;align-items:center;gap:3px;width:32px;flex-shrink:0;">
        <div class="lb-num ${rankCls[i]||''}">${rankSym[i]||i+1}</div>
        ${rcHtml}
      </div>
      <div class="lb-avatar ${i===0?'a0':''}">${initials(p.name)}</div>
      <div class="lb-info">
        <div class="lb-name-row">
          <span class="lb-name">${p.name}</span>
          ${i===0?'<span class="leader-pill">Leader</span>':''}
          ${streakHtml}
        </div>
        <div class="lb-sub">
          <div class="lb-medals">🥇 ${fpMap[p.name]??0}&nbsp;🥈 ${spMap[p.name]??0}&nbsp;🥉 ${tpMap[p.name]??0}</div>
          <span class="lb-accuracy">${acc.pct}% accuracy</span>
          <span class="lb-total-correct">${acc.total} correct</span>
        </div>
      </div>
      <div class="lb-bar-col">
        <div class="lb-bar-bg"><div class="lb-bar-fill" style="width:${(p.pts/maxPts*100).toFixed(1)}%"></div></div>
      </div>
      <div>
        <div class="lb-score">${p.pts}</div>
        <div class="lb-score-label">pts</div>
      </div>
    </div>`;
  }).join('');
  animate([...document.querySelectorAll('.lb-row')],'show',65);

  /* ── MATCHES ── */
  const rankLabel=['1ST PICK','2ND PICK','3RD PICK'];
  document.getElementById('matches-grid').innerHTML = [...data.matches].reverse().map((m, mi) => {
    const parts = m.match.split(' vs ');
    const matchNum = totalMatches - mi;
    const isLast = mi === 0; // most recent = first after reverse
    const isFirst = mi === data.matches.length - 1; // oldest
    // Label: last = "Latest · Done", first upcoming = "Upcoming", rest = "Done"
    let statusPill = '';
    if (isLast) {
      statusPill = `<span class="match-status-pill pill-done">✓ Latest</span>`;
    } else if (matchNum === totalMatches) {
      statusPill = `<span class="match-status-pill pill-live">⬤ Live</span>`;
    } else {
      statusPill = `<span class="match-status-pill pill-done">Done</span>`;
    }

    return `
    <div class="match-card ${isLast ? 'current-match' : ''}">
      <div class="match-header">
        <div class="match-header-left">
          <div class="match-name">${parts[0]||m.match}<span class="match-vs"> vs </span>${parts[1]||''}</div>
          ${statusPill}
        </div>
        <div class="match-num">Match ${matchNum}</div>
      </div>
      <div class="picks-row">${m.picks.map((p,pi)=>{
        const isEmpty = !p || p==='—' || p==='-' || p==='';
        return `<div class="pick-chip">
          <div class="pick-rank ${rankCls[pi]}">${rankLabel[pi]}</div>
          <div class="pick-name ${isEmpty?'empty':''}">${isEmpty?'—':p}</div>
        </div>`;
      }).join('')}</div>
    </div>`;
  }).join('');
  animate([...document.querySelectorAll('.match-card')],'show',80);

  /* ── CHART ── */
  document.getElementById('chart-wrap').innerHTML = sorted.map(p=>`
    <div class="chart-row-wrap">
      <div class="chart-label">${p.name}</div>
      <div class="chart-track">
        ${p.pts>0
          ?`<div class="chart-fill" style="width:${(p.pts/maxPts*100).toFixed(1)}%"><span class="chart-fill-val">${p.pts}</span></div>`
          :`<span class="chart-zero">0 pts</span>`}
      </div>
    </div>`).join('');
}

async function autoLoad() {
  setStatus('Loading…');
  try {
    const csvUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;
    const resp = await fetch(csvUrl);
    if (!resp.ok) throw new Error('Sheet could not be loaded. Make sure it is shared publicly.');
    const text = await resp.text();
    const data = parseCSV(text);
    renderDashboard(data);
    const now = new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
    setStatus('Updated ' + now, 'ok');
  } catch(e) {
    setStatus('⚠ ' + e.message, 'error');
  }
}

function manualRefresh() {
  autoLoad();
  startTimer();
}

window.addEventListener('load', () => {
  autoLoad();
  startTimer();
});

function parseCSV(text) {
  const rows = text.trim().split('\n').map(r=>{
    const out=[]; let cur='', inQ=false;
    for (const c of r) {
      if (c==='"') { inQ=!inQ; }
      else if (c===',' && !inQ) { out.push(cur.trim()); cur=''; }
      else cur+=c;
    }
    out.push(cur.trim());
    return out;
  });

  const matches=[], winners=[], firstPlace=[], secondPlace=[], thirdPlace=[];

  let winnerRow=-1, firstRow=-1, secondRow=-1, thirdRow=-1;
  for (let i=0; i<rows.length; i++) {
    const j=(rows[i][9]||'').trim();
    if (/winner/i.test(j) && !/most/i.test(j)) winnerRow=i;
    if (/most first/i.test(j))  firstRow=i;
    if (/most second/i.test(j)) secondRow=i;
    if (/most third/i.test(j))  thirdRow=i;
  }

  function collectSection(startRow, endRow) {
    const out=[];
    if (startRow<0) return out;
    const limit = endRow>0 ? endRow : rows.length;
    for (let i=startRow+1; i<limit; i++) {
      const name=(rows[i][9]||'').trim();
      const val=(rows[i][10]||'').trim();
      if (!name) continue;
      if (/most|winner/i.test(name)) break;
      const num=parseFloat(val);
      if (name && !isNaN(num)) out.push({name, count:num});
    }
    return out;
  }

  const sectionStarts=[
    {key:'winners',row:winnerRow},{key:'first',row:firstRow},
    {key:'second',row:secondRow},{key:'third',row:thirdRow}
  ].filter(s=>s.row>=0).sort((a,b)=>a.row-b.row);

  for (let si=0; si<sectionStarts.length; si++) {
    const {key,row}=sectionStarts[si];
    const nextRow=sectionStarts[si+1]?.row??rows.length;
    const entries=collectSection(row,nextRow);
    if (key==='winners') entries.forEach(e=>winners.push({name:e.name,pts:e.count}));
    if (key==='first')   entries.forEach(e=>firstPlace.push({name:e.name,count:e.count}));
    if (key==='second')  entries.forEach(e=>secondPlace.push({name:e.name,count:e.count}));
    if (key==='third')   entries.forEach(e=>thirdPlace.push({name:e.name,count:e.count}));
  }

  for (let i=0; i<rows.length; i++) {
    const a=(rows[i][0]||'').trim();
    if (a.includes(' vs ')) {
      const picks=[];
      for (let c=1; c<=8 && picks.length<3; c++) {
        const val=(rows[i][c]||'').trim();
        if (val && isNaN(parseFloat(val))) picks.push(val);
      }
      while (picks.length<3) picks.push('—');
      matches.push({match:a,picks});
    }
  }

  if (!winners.length) return DEMO;
  return {matches,winners,firstPlace,secondPlace,thirdPlace};
}
